<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robotic Esports | Mobile HUD</title>
    <!-- Modern Gaming Font -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --primary: #bc13fe; 
            --secondary: #00f2ff;
            --bg-dark: #05010d; 
            --glass-dark: rgba(6, 1, 18, 0.85);
            --border-glow: rgba(188, 19, 254, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            width: 100vw;
            background: var(--bg-dark);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ANIMATED CYBER GRID BACKGROUND */
        body::before {
            content: "";
            position: absolute;
            inset: -50%;
            background-image: 
                linear-gradient(var(--border-glow) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-glow) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(400px) rotateX(65deg);
            animation: gridScroll 12s linear infinite;
            opacity: 0.25;
            z-index: 1;
        }

        @keyframes gridScroll {
            0% { transform: perspective(400px) rotateX(65deg) translateY(0); }
            100% { transform: perspective(400px) rotateX(65deg) translateY(50px); }
        }

        /* CRT SCANLINES EFFECT */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        /* MAIN HUD INTERFACE */
        .hud-interface {
            position: relative;
            z-index: 5;
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Distributes top and bottom evenly */
            padding: 40px 25px;
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 1, 13, 0.9) 100%);
        }

        .top-section {
            text-align: center;
            animation: slideDown 1s ease-out;
        }

        /* LARGE LOGO WITH BI-COLOR GLOW */
        .hero-image {
            width: 210px; /* Big, dominant size */
            filter: drop-shadow(0 0 15px var(--secondary)) drop-shadow(0 0 30px var(--primary));
            margin-bottom: 20px;
            animation: pulseHero 3s infinite ease-in-out;
        }

        h1 {
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 15px var(--secondary), 0 0 30px var(--primary);
            letter-spacing: 4px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--secondary);
            font-size: 0.7rem;
            letter-spacing: 7px;
            text-transform: uppercase;
            font-weight: 900;
            opacity: 0.9;
        }

        /* MOBILE OPTIMIZED BUTTON STACK */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            animation: slideUp 1s ease-out;
        }

        .btn {
            text-decoration: none;
            padding: 20px;
            background: var(--glass-dark);
            border: 2px solid var(--secondary);
            color: #fff;
            text-align: center;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 6px;
            position: relative;
            transition: 0.2s;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }

        /* TECH BRACKET DECORATION */
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 12px; height: 12px;
            border-top: 3px solid var(--secondary);
            border-left: 3px solid var(--secondary);
        }

        /* TAP INTERACTION */
        .btn:active {
            background: var(--secondary);
            color: #000;
            box-shadow: 0 0 40px var(--secondary);
            transform: scale(0.96);
        }

        /* KEYFRAME ANIMATIONS */
        @keyframes pulseHero {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--secondary)) drop-shadow(0 0 30px var(--primary)); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 25px var(--secondary)) drop-shadow(0 0 50px var(--primary)); }
        }

        @keyframes slideDown {
            from { transform: translateY(-60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1.8rem; }
            .hero-image { width: 180px; }
        }
    </style>
</head>
<body>

    <main class="hud-interface">
        <section class="top-section">
            <!-- Ensure your logo file is named correctly -->
            <img src="robotics.1%20official%20logo.png" alt="Robotic Esports Logo" class="hero-image">
            <h1>ROBOTIC</h1>
            <p class="subtitle">Phase Into Future</p>
        </section>

        <nav class="nav-menu">
            <a href="game types.html" class="btn">Gaming Menu</a>
            <a href="location.html.html" class="btn">Location</a>
            <a href="contact information.html" class="btn">Information</a>
            <a href="price list.html" class="btn">Price List</a>
        </nav>
    </main>

</body>
</html>
